name: PrivaVoz
description: PrivaVoz - Gravador de Voz com IA 100% Offline
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5
  
  # Audio Recording
  record: ^5.0.4
  just_audio: ^0.9.36
  
  # IA & FFI
  ffi: ^2.1.0
  
  # Security
  local_auth: ^2.1.8
  encrypt: ^5.0.3
  flutter_secure_storage: ^9.0.0
  
  # Storage
  path_provider: ^2.1.1
  sqflite: ^2.3.0
  
  # UI Components
  flutter_svg: ^2.0.9
  lottie: ^3.0.0
  shimmer: ^3.0.0
  
  # Utils
  permission_handler: ^11.1.0
  uuid: ^4.2.1
  intl: ^0.18.1
  share_plus: ^7.2.1
  
  # Monetization
  in_app_purchase: ^5.0.1
  
  # Services
  flutter_local_notifications: ^16.1.0
  
  # Icons
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/
    - assets/icons/
    - assets/images/
    - models/  # Include model placeholders for build
    
  # Enable shader warmup for performance
  shader: enable