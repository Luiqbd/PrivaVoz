name: Build PrivaVoz APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Download AI Models from Release
        run: |
          mkdir -p models
          echo "Downloading Whisper Tiny (75MB)..."
          curl -L -o models/whisper-tiny.bin "https://github.com/Luiqbd/PrivaVoz/releases/download/v1.0.0-models/whisper-tiny.bin"
          echo "Downloading TinyLlama (637MB)..."
          curl -L -o models/tinyllama-1.1b-q4.gguf "https://github.com/Luiqbd/PrivaVoz/releases/download/v1.0.0-models/tinyllama-1.1b-q4.gguf"
          ls -lh models/
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: Setup Android SDK
        uses: android-actions/setup-android@v2
      
      - name: Setup NDK
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses 2>/dev/null || true
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "ndk;26.1.10909125"
          echo "NDK installed"
          ls -la $ANDROID_HOME/ndk/
      
      - name: Download whisper.cpp
        run: |
          cd /tmp
          git clone --depth 1 --branch v1.7.1 https://github.com/ggerganov/whisper.cpp.git
          ls -la whisper.cpp/
      
      - name: Download llama.cpp
        run: |
          cd /tmp
          git clone --depth 1 https://github.com/ggerganov/llama.cpp.git
          ls -la llama.cpp/
      
      - name: Copy native sources to project
        run: |
          cp -r /tmp/whisper.cpp android/app/src/main/cpp/whisper.cpp
          cp -r /tmp/llama.cpp android/app/src/main/cpp/llama.cpp
          ls android/app/src/main/cpp/
      
      - name: Create bridge files
        run: |
          # Create whisper_bridge.cpp
          cat > android/app/src/main/cpp/whisper_bridge.cpp << 'EOF'
          #include <jni.h>
          #include <android/log.h>
          #include "whisper.cpp/src/whisper.h"
          
          #define LOG(...) __android_log_print(ANDROID_LOG_INFO, "WhisperNative", __VA_ARGS__)
          
          static struct whisper_context* ctx = nullptr;
          
          extern "C" JNIEXPORT jboolean JNICALL
          Java_com_privavoZ_app_WhisperBridge_init(JNIEnv* env, jobject thiz, jstring modelPath) {
              const char* path = env->GetStringUTFChars(modelPath, nullptr);
              ctx = whisper_init_from_file(path);
              env->ReleaseStringUTFChars(modelPath, path);
              LOG("Whisper initialized: %s", ctx ? "OK" : "FAIL");
              return ctx ? JNI_TRUE : JNI_FALSE;
          }
          
          extern "C" JNIEXPORT jstring JNICALL
          Java_com_privavoZ_app_WhisperBridge_transcribe(JNIEnv* env, jobject thiz, jstring audioPath) {
              if (!ctx) return env->NewStringUTF("");
              // Simplified: return placeholder (full impl needs audio decoding)
              return env->NewStringUTF("Transcription mock (native available)");
          }
          EOF
          
          # Create llama_bridge.cpp
          cat > android/app/src/main/cpp/llama_bridge.cpp << 'EOF'
          #include <jni.h>
          #include <android/log.h>
          #include "llama.cpp/llama.h"
          
          #define LOG(...) __android_log_print(ANDROID_LOG_INFO, "LlamaNative", __VA_ARGS__)
          
          static struct llama_context* ctx = nullptr;
          
          extern "C" JNIEXPORT jboolean JNICALL
          Java_com_privavoZ_app_LlamaBridge_init(JNIEnv* env, jobject thiz, jstring modelPath) {
              struct llama_model_params mparams = llama_model_default_params();
              mparams.n_gpu_layers = 0; // CPU only for mobile
              const char* path = env->GetStringUTFChars(modelPath, nullptr);
              ctx = llama_load_model_from_file(path, mparams);
              env->ReleaseStringUTFChars(modelPath, path);
              LOG("Llama initialized: %s", ctx ? "OK" : "FAIL");
              return ctx ? JNI_TRUE : JNI_FALSE;
          }
          
          extern "C" JNIEXPORT jstring JNICALL
          Java_com_privavoZ_app_LlamaBridge_generate(JNIEnv* env, jobject thiz, jstring prompt) {
              if (!ctx) return env->NewStringUTF("");
              return env->NewStringUTF("Summary mock (native available)");
          }
          EOF
          
          echo "Bridge files created"
      
      - name: Create working CMakeLists.txt
        run: |
          cat > android/app/src/main/cpp/CMakeLists.txt << 'EOF'
          cmake_minimum_required(VERSION 3.18.1)
          project("privavoz")
          
          set(CMAKE_CXX_STANDARD 17)
          set(CMAKE_CXX_STANDARD_REQUIRED ON)
          
          find_library(log-lib log)
          find_library(android-lib android)
          
          # Build Whisper
          add_library(whisper SHARED
              whisper_bridge.cpp
              whisper.cpp/src/ggml.c
              whisper.cpp/src/whisper.cpp
          )
          
          target_include_directories(whisper PRIVATE
              whisper.cpp/src
          )
          
          target_link_libraries(whisper
              ${log-lib}
              m
              openmp
          )
          
          # Build Llama
          add_library(llama SHARED
              llama_bridge.cpp
              llama.cpp/ggml.c
              llama.cpp/llama.cpp
          )
          
          target_include_directories(llama PRIVATE
              llama.cpp
          )
          
          target_link_libraries(llama
              ${log-lib}
              m
              openmp
          )
          EOF
          echo "CMakeLists.txt created"
      
      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
      
      - name: Get Flutter dependencies
        run: flutter pub get
      
      - name: Build debug APK
        run: |
          flutter build apk --debug -v 2>&1 | tail -50
      
      - name: Build release APK
        run: |
          flutter build apk --release -v 2>&1 | tail -50
      
      - name: List build outputs
        run: |
          ls -la build/app/outputs/flutter-apk/
          ls -lh build/app/outputs/flutter-apk/*.apk
      
      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: privavoz-debug.apk
          path: build/app/outputs/flutter-apk/app-debug.apk
      
      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: privavoz-release.apk
          path: build/app/outputs/flutter-apk/app-release.apk