name: Build PrivaVoz APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          lfs: true
      
      - name: Download AI Models from Release
        run: |
          mkdir -p models
          echo "Downloading Whisper Tiny..."
          curl -L -o models/whisper-tiny.bin "https://github.com/Luiqbd/PrivaVoz/releases/download/v1.0.0-models/whisper-tiny.bin"
          echo "Downloading TinyLlama..."
          curl -L -o models/tinyllama-1.1b-q4.gguf "https://github.com/Luiqbd/PrivaVoz/releases/download/v1.0.0-models/tinyllama-1.1b-q4.gguf"
          ls -lh models/
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: Setup Android SDK
        uses: android-actions/setup-android@v2
      
      - name: Setup NDK
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses 2>/dev/null || true
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "ndk;26.1.10909125"
      
      - name: Cache Flutter
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            build/
          key: ${{ runner.os }}-flutter-${{ hashFiles('**/pubspec.yaml') }}
          restore-keys: |
            ${{ runner.os }}-flutter-
      
      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
      
      - name: Get Flutter dependencies
        run: flutter pub get
      
      - name: Build debug APK with native libs
        run: |
          flutter build apk --debug \
            --target-platform android-arm64 \
            -v
      
      - name: Build release APK with native libs
        run: |
          flutter build apk --release \
            --target-platform android-arm64 \
            -v
      
      - name: List build outputs
        run: |
          ls -la build/app/outputs/flutter-apk/
          ls -lh build/app/outputs/flutter-apk/*.apk
      
      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: privavoz-debug.apk
          path: build/app/outputs/flutter-apk/app-debug.apk
      
      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: privavoz-release.apk
          path: build/app/outputs/flutter-apk/app-release.apk
      
      - name: Create Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          # Create GitHub Release with APK
          gh release create "v1.0.0-apk" \
            --title "PrivaVoz v1.0.0 (APK)" \
            --notes "PrivaVoz Android App - 100% Offline with AI models included!

Built with:
- Whisper Tiny (75MB) for transcription
- TinyLlama 1.1B (637MB) for summaries
- Native FFI libraries compiled with NDK

Download and install on your Android device!" \
            build/app/outputs/flutter-apk/app-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}